<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원 등록</title>
</head>
<body>
<h2>회원 가입</h2>
<form th:action="@{/member/write}" method="post">
	<div>아이디: <input type="text" name="id" required></div>
	<div>비밀번호: <input type="password" name="password" required></div>
	<div>이름: <input type="text" name="name" required></div>
	<div>성별: 
		<input type="radio" name="gender" value="M">남
		<input type="radio" name="gender" value="F">여
	</div>
	<div>생년월일: <input type="text" name="birth" placeholder="(예시:YYYY-MM-DD)"></div>
	<div>이메일: <input type="email" name="mail"></div>
	<div>전화번호: <input type="tel" name="phone" placeholder="010-0000-0000"></div>
	<div>주소: <input type="text" name="address"></div>
	<br>
	<button type="submit">가입하기</button>
	<button type="button" onclick="history.back()">취소</button>
</form>
</body>
</html>
